<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dmitry Filippov</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101114;
        --ink: #f4f0e8;
        --accent: #d6a85f;
        --soft: #8aa4a8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 24% 28%, rgba(214, 168, 95, 0.18), transparent 30%),
          radial-gradient(circle at 78% 72%, rgba(138, 164, 168, 0.16), transparent 34%),
          linear-gradient(135deg, #101114 0%, #191b20 48%, #0d1012 100%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 900px);
        padding: 48px 24px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3.25rem, 12vw, 8rem);
        font-weight: 500;
        line-height: 0.94;
        letter-spacing: 0;
        text-wrap: balance;
        text-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
      }

      h1 span {
        display: block;
      }

      .rule {
        width: min(220px, 42vw);
        height: 2px;
        margin: 34px auto 0;
        background: linear-gradient(90deg, transparent, var(--accent), var(--soft), transparent);
      }

      .links {
        margin: 30px 0 0;
      }

      .links a {
        display: inline-block;
        font-size: 0.8rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--soft);
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: color 0.2s ease, border-color 0.2s ease;
      }

      .links a:hover {
        color: var(--accent);
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main aria-label="Homepage">
      <h1><span>Dmitry</span><span>Filippov</span></h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="links"><a href="/2026-07-11-patio/">Patio Matchday · World Cup, July 11</a></p>
    </main>
  </body>
</html>
